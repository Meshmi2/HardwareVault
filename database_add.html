<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Add Hardware</title>
	<style>
		body{font-family:system-ui,Segoe UI,Roboto,Arial;background:#f5f7fb;margin:0;padding:20px}
		.container{max-width:800px;margin:24px auto;background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(10,10,20,.08)}
		h1{margin:0 0 16px;font-size:20px}
		form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
		label{display:block;font-size:13px;margin-bottom:6px}
		input,select,textarea{width:100%;padding:8px;border:1px solid #d7dbe8;border-radius:6px;font-size:14px}
		textarea{min-height:100px;resize:vertical}
		.full{grid-column:1/-1}
		.actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
		button{background:#2563eb;color:#fff;border:0;padding:10px 14px;border-radius:6px;cursor:pointer}
		button.secondary{background:#f3f4f6;color:#111}
		.image-preview{margin-top:10px;padding:12px;border:1px dashed #d7dbe8;border-radius:6px;min-height:120px;display:flex;align-items:center;justify-content:center;color:#6b7280;background:#f9fafb}
		.image-preview img{max-width:100%;max-height:180px;object-fit:contain;border-radius:6px}
		.note{font-size:13px;color:#6b7280}
		.error{color:#b91c1c;font-size:13px}
	</style>
</head>
<body>
	<div class="container">
		<h1>Add Hardware to Database</h1>
		<p class="note">Fill the form below and submit to add a hardware item to the database.</p>

		<form id="addForm" action="/add_hardware" method="post" enctype="multipart/form-data">
			<div>
				<label for="name">Name*</label>
				<input id="name" name="name" type="text" required>
			</div>

			<div>
				<label for="category">Category</label>
				<select id="category" name="category">
					<option value="">-- Select --</option>
					<option>CPU</option>
					<option>GPU</option>
					<option>MainBoard</option>
					<option>Ram</option>
					<option>Cooler</option>
					<option>Storage</option>
					<option>Peripheral</option>
					<option>Other</option>
				</select>
			</div>

			<div>
				<label for="model">Model</label>
				<input id="model" name="model" type="text">
			</div>

			<div>
				<label for="image">Product Image</label>
				<input id="image" name="image" type="file" accept="image/*">
				<div id="imagePreview" class="image-preview">Nessuna immagine selezionata</div>
			</div>

			<div>
				<label for="Year"> Year</label>
				<input id="year" name="year" type="number">
			</div>

			<div>
				<label for="vendor">Vendor</label>
				<input id="vendor" name="vendor" type="text">
			</div>

			<div>
				<label for="Megahertz">Megahertz</label>
				<input id="megahertz" name="megahertz" type="number" step="0.01" min="0">
			</div>

			<div>
				<label for="quantity">Quantity</label>
				<input id="quantity" name="quantity" type="number" min="1" value="1">
			</div>

			<div class="full">
				<label for="description">Description / Notes</label>
				<textarea id="description" name="description"></textarea>
			</div>

			<div class="full">
				<div class="actions">
					<button type="submit">Add Hardware</button>
					<button type="button" class="secondary" id="resetBtn">Reset</button>
				</div>
			</div>

			<div id="msg" class="full"></div>
		</form>
	</div>

	<script>
		const form = document.getElementById('addForm');
		const msg = document.getElementById('msg');
		const imageInput = document.getElementById('image');
		const imagePreview = document.getElementById('imagePreview');
		document.getElementById('resetBtn').addEventListener('click', ()=>{
			form.reset();
			imagePreview.innerHTML = 'Nessuna immagine selezionata';
		});

		imageInput.addEventListener('change', ()=>{
			const file = imageInput.files[0];
			if(!file){
				imagePreview.innerHTML = 'Nessuna immagine selezionata';
				return;
			}
			const reader = new FileReader();
			reader.onload = () => {
				imagePreview.innerHTML = `<img src="${reader.result}" alt="Preview immagine">`;
			};
			reader.readAsDataURL(file);
		});

		form.addEventListener('submit', async (e)=>{
			e.preventDefault();
			msg.textContent = '';
			const data = new FormData(form);
			try{
				const res = await fetch(form.action, {method:form.method, body:data});
				if(res.ok){
					msg.textContent = 'Hardware added successfully.';
					msg.className = 'note full';
					form.reset();
				} else {
					const text = await res.text();
					msg.textContent = 'Error: '+(text||res.statusText);
					msg.className = 'error full';
				}
			}catch(err){
				msg.textContent = 'Network error';
				msg.className = 'error full';
			}
		});
	</script>
</body>
</html>
